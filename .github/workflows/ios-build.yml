name: iOS Build
# Solo manual: el proyecto no tiene plataforma iOS configurada (sin ios/App/Podfile),
# así que en push/PR fallaba. Ejecútalo a mano cuando exista el proyecto iOS.
on:
  workflow_dispatch:

# Compila el proyecto iOS SIN FIRMAR en un runner macOS (smoke test: verifica
# que el proyecto Capacitor iOS compila). No produce un IPA instalable —
# distribuir requiere cuenta Apple Developer + firma.
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build web
        run: npm run build
      - name: Add iOS platform (if missing)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Install CocoaPods
        run: cd ios/App && pod install
      - name: Build (unsigned, simulator)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
